    function StatCounter({ end, suffix, label, delay = 0 }) {
      const [count, setCount] = React.useState(0);
      React.useEffect(() => {
        const t = setTimeout(() => {
          const duration = 1800;
          const start = performance.now();
          function step(now) {
            const progress = Math.min((now - start) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            setCount(Math.floor(eased * end));
            if (progress < 1) requestAnimationFrame(step);
          }
          requestAnimationFrame(step);
        }, delay);
        return () => clearTimeout(t);
      }, [end, delay]);
      return (
        <div className="text-center">
          <p className="text-3xl md:text-4xl font-serif font-bold text-amber-400">{count}{suffix}</p>
          <p className="text-sm text-blue-200 mt-1">{label}</p>
        </div>
      );
    }

                <h2 className="text-4xl font-serif font-bold text-slate-900 mt-4">{t.teamTitle}</h2>
              </div>
              <div className="grid md:grid-cols-2 gap-12 items-center">
                <div className={`transition-all duration-1000 ${vis('team')}`}>
                  <div
                    className="rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition-shadow cursor-pointer"
                    onClick={() => { setGalleryIndex(0); setShowGallery(true); }}
                    title={t.galleryTitle}
                  >
                    <img src={profilePhoto} alt="Anisley G Rivero" className="w-full h-auto object-cover" />
                  </div>
                  <p className="text-center text-sm text-slate-500 italic mt-3">{t.agentCaption}</p>
                </div>
                <div className={`space-y-6 transition-all duration-1000 ${vis('team')}`}
                  style={{ transitionDelay: visibleSections.team ? '100ms' : '0ms' }}>
                  <div>
                    <h3 className="text-3xl font-serif font-bold text-slate-900 mb-2">{t.teamTitle}</h3>
                    <p className="text-amber-500 font-semibold text-lg mb-4">{t.teamRole}</p>
                  </div>
                  <p className="text-lg text-slate-600 leading-relaxed">{t.teamDesc}</p>
                  <div className="pt-4">
                    <h4 className="font-semibold text-slate-900 mb-3">{t.teamSpecialties}:</h4>
                    <div className="flex flex-wrap gap-2">
                      {[t.teamObamacare, t.teamLife, t.teamFamily].map((sp, i) => (
                        <span key={i} className="px-4 py-2 bg-amber-100 text-amber-900 rounded-full font-semibold text-sm">{sp}</span>
                      ))}
                    </div>
                  </div>
                  <div className="pt-6 border-t border-slate-200">
                    <button onClick={() => setShowContactModal(true)}
                      className="px-8 py-3 bg-amber-500 text-white rounded-lg hover:bg-amber-600 transition-all hover:shadow-xl font-semibold inline-flex items-center gap-2">
                      <PhoneIcon className="w-5 h-5" /> {t.navContact}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </section>

          {/* ── CONTACTO ── */}
          <section id="contact" className="py-20 px-6 bg-gradient-to-br from-slate-900 to-slate-800 text-white">
            <div className="max-w-6xl mx-auto">
              <div className={`grid md:grid-cols-2 gap-12 transition-all duration-1000 ${vis('contact')}`}>
                {/* Info */}
                <div className="space-y-8">
                  <div>
                    <span className="text-amber-400 font-semibold text-sm tracking-widest">{t.contactSpan}</span>
                    <h2 className="text-4xl font-serif font-bold mt-4">{t.contactTitle}</h2>
                  </div>
                  <p className="text-slate-300 leading-relaxed">{t.contactDesc}</p>
                  <div className="space-y-6 pt-4">
                    <a href="tel:+17863931906" className="flex items-start gap-4 group">
                      <PhoneIcon className="w-6 h-6 text-amber-400 flex-shrink-0 mt-1" />
                      <div>
                        <p className="font-semibold text-sm text-amber-400 mb-1">{t.phonLabel}</p>
                        <p className="text-white text-lg group-hover:text-amber-300 transition-colors">786-393-1906</p>
                      </div>
                    </a>
                    <a href="mailto:anisley.grivero@gmail.com" className="flex items-start gap-4 group">
                      <MailIcon className="w-6 h-6 text-amber-400 flex-shrink-0 mt-1" />
                      <div>
                        <p className="font-semibold text-sm text-amber-400 mb-1">{t.emailLabel}</p>
                        <p className="text-white text-lg group-hover:text-amber-300 transition-colors">anisley.grivero@gmail.com</p>
                      </div>
                    </a>
                    <div className="flex items-start gap-4">
                      <MapPinIcon className="w-6 h-6 text-amber-400 flex-shrink-0 mt-1" />
                      <div>
                        <p className="font-semibold text-sm text-amber-400 mb-1">{t.areaLabel}</p>
                        <p className="text-white text-lg">Florida & Texas</p>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Formulario */}
                <div className="bg-white/10 backdrop-blur-sm p-8 rounded-2xl border border-white/20">
                  <h3 className="text-2xl font-serif font-bold mb-6">{t.formTitle}</h3>

                  {formStatus === 'success' ? (
                    <div className="flex flex-col items-center justify-center h-64 text-center space-y-4">
                      <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center">
                        <CheckIcon className="w-8 h-8 text-white" />
                      </div>
                      <p className="text-lg font-semibold text-green-300">{t.formSuccess}</p>
                      <button onClick={() => setFormStatus('idle')} className="text-slate-300 hover:text-white underline text-sm">
                        {language==='es' ? 'Enviar otro mensaje' : 'Send another message'}
                      </button>
                    </div>
                  ) : (
                    <form onSubmit={handleSubmit} className="space-y-4">
                      <div>
                        <label className="block text-sm font-semibold mb-2">{t.formName} *</label>
                        <input name="name" type="text" required value={formData.name} onChange={handleFormChange}
                          placeholder={t.formNamePlaceholder}
                          className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400" />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-2">{t.formPhone} *</label>
                        <input name="phone" type="tel" required value={formData.phone} onChange={handleFormChange}
                          placeholder={t.formPhonePlaceholder}
                          className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400" />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-2">{t.formEmail}</label>
                        <input name="email" type="email" value={formData.email} onChange={handleFormChange}
                          placeholder={t.formEmailPlaceholder}
                          className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400" />
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-2">{t.formType}</label>
                        <select name="type" value={formData.type} onChange={handleFormChange}
                          className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-amber-400">
                          <option value="" className="text-slate-900">{t.formSelect}</option>
                          <option value="Seguro de Vida / Life Insurance" className="text-slate-900">{t.formVida}</option>
                          <option value="Obamacare" className="text-slate-900">{t.formMedico}</option>
                          <option value="Seguros Familiares / Family Insurance" className="text-slate-900">{t.formFamiliar}</option>
                          <option value="Taxes Personales y Corporativos / Personal & Corporate Taxes" className="text-slate-900">{t.service5Title}</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-sm font-semibold mb-2">{t.formMessage}</label>
                        <textarea name="message" value={formData.message} onChange={handleFormChange}
                          placeholder={t.formMessagePlaceholder} rows="3"
                          className="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none" />
                      </div>
                      {formStatus === 'error' && (
                        <p className="text-red-400 text-sm">{t.formError}</p>
                      )}
                      <button type="submit" disabled={formStatus==='sending'}
                        className="w-full py-3 bg-amber-500 hover:bg-amber-600 disabled:bg-amber-700 text-white font-semibold rounded-lg transition-all duration-300 hover:shadow-xl flex items-center justify-center gap-2">
                        {formStatus==='sending' ? (
                          <><span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin inline-block"></span> {t.formSending}</>
                        ) : t.formSubmit}
                      </button>
                    </form>
                  )}
                </div>
              </div>
            </div>
          </section>

          {/* ── FOOTER ── */}
          <footer className="bg-slate-950 text-slate-400 py-8 px-6 text-center text-sm">
            <div className="max-w-6xl mx-auto">
              <p className="font-serif text-white text-lg mb-1">{t.footerCompany}</p>
              <p>{t.footerRole}</p>
              <p className="mt-4">{t.footerDisclaimer}</p>
            </div>
          </footer>

          {/* ── MODAL GALERÍA DE FOTOS ── */}
          {showGallery && (
            <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4"
              onClick={() => setShowGallery(false)}>
              <div className="relative max-w-2xl w-full" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-white text-xl font-serif font-bold">{t.galleryTitle}</h2>
                  <button onClick={() => setShowGallery(false)}
                    className="text-white hover:text-amber-400 transition-colors p-2">
                    <XIcon className="w-6 h-6" />
                  </button>
                </div>
                <div className="rounded-2xl overflow-hidden shadow-2xl">
                  <img
                    src={agentPhotos[galleryIndex].src}
                    alt={agentPhotos[galleryIndex].alt}
                    className="w-full h-auto max-h-[75vh] object-contain bg-slate-900"
                  />
                </div>
                {agentPhotos.length > 1 && (
                  <div className="flex justify-center gap-3 mt-4">
                    {agentPhotos.map((_, i) => (
                      <button key={i} onClick={() => setGalleryIndex(i)}
                        className={`w-3 h-3 rounded-full transition-colors ${i===galleryIndex ? 'bg-amber-500' : 'bg-white/40 hover:bg-white/70'}`} />
                    ))}
                  </div>
                )}
                <p className="text-center text-slate-400 text-sm mt-3">{t.agentCaption}</p>
              </div>
            </div>
          )}

          {/* ── MODAL CONTACTO ── */}
          {showContactModal && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 animate-fadeInUp">
                <div className="text-center mb-8">
                  <h2 className="text-3xl font-serif font-bold text-slate-900 mb-2">{t.contactModalTitle}</h2>
                  <div className="w-12 h-1 bg-amber-500 mx-auto rounded"></div>
                </div>
                <div className="space-y-4">
                  <a href="mailto:anisley.grivero@gmail.com"
                    className="flex items-center gap-4 p-5 rounded-xl border-2 border-slate-200 hover:border-amber-500 hover:bg-amber-50 transition-all duration-300 group">
                    <MailIcon className="w-8 h-8 text-amber-500 flex-shrink-0" />
                    <div className="flex-1">
                      <p className="font-semibold text-slate-900 group-hover:text-amber-600">{t.contactModalEmail}</p>
                      <p className="text-sm text-slate-600">anisley.grivero@gmail.com</p>
                    </div>
                    <ArrowRightIcon className="w-5 h-5 text-amber-500 group-hover:translate-x-1 transition-transform" />
                  </a>
                  <a href="tel:+17863931906"
                    className="flex items-center gap-4 p-5 rounded-xl border-2 border-slate-200 hover:border-amber-500 hover:bg-amber-50 transition-all duration-300 group">
                    <PhoneIcon className="w-8 h-8 text-amber-500 flex-shrink-0" />
                    <div className="flex-1">
                      <p className="font-semibold text-slate-900 group-hover:text-amber-600">{t.contactModalPhone}</p>
                      <p className="text-sm text-slate-600">786-393-1906</p>
                    </div>
                    <ArrowRightIcon className="w-5 h-5 text-amber-500 group-hover:translate-x-1 transition-transform" />
                  </a>
                </div>
                <button onClick={() => setShowContactModal(false)}
                  className="w-full mt-8 py-3 text-slate-600 hover:text-slate-900 font-semibold transition-colors">
                  {t.contactModalClose}
                </button>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Montar la app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SeguroVital />);
  </script>
</body>
</html>
